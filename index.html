<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenFocus | Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glows">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>
    
    <main class="container">
        <header class="app-header">
            <h1 class="logo">ZenFocus</h1>
            <p class="subtitle">Streamline your productivity, one cycle at a time</p>
        </header>

        <section class="timer-card">
            <!-- Mode Selector -->
            <div class="mode-selector">
                <button class="mode-btn active" data-mode="pomodoro">Focus</button>
                <button class="mode-btn" data-mode="short">Short Break</button>
                <button class="mode-btn" data-mode="long">Long Break</button>
            </div>

            <!-- Timer Circle -->
            <div class="timer-display-container">
                <svg class="progress-ring" width="240" height="240">
                    <circle class="progress-ring__circle-bg" stroke="rgba(255,255,255,0.05)" stroke-width="8" fill="transparent" r="110" cx="120" cy="120"/>
                    <circle id="timer-progress" class="progress-ring__circle" stroke="url(#gradient)" stroke-width="8" fill="transparent" r="110" cx="120" cy="120"/>
                    <defs>
                        <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#8b5cf6" />
                            <stop offset="100%" stop-color="#ec4899" />
                        </linearGradient>
                    </defs>
                </svg>
                <div class="timer-text">
                    <span id="timer-countdown">25:00</span>
                    <span id="timer-state-label" class="state-label">GET TO WORK</span>
                </div>
            </div>

            <!-- Controls -->
            <div class="timer-controls">
                <button id="btn-reset" class="control-btn secondary" title="Reset Timer">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M16 3h5v5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M8 21H3v-5"></path></svg>
                </button>
                
                <button id="btn-toggle" class="control-btn primary" title="Start Timer">
                    <svg id="play-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"></polygon></svg>
                    <svg id="pause-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="14" y="4" width="4" height="16" rx="1"></rect><rect x="6" y="4" width="4" height="16" rx="1"></rect></svg>
                </button>
            </div>
        </section>

        <footer class="app-footer">
            <div class="stats-panel">
                <div class="stat-item">
                    <span class="stat-value" id="sessions-count">0</span>
                    <span class="stat-label">Sessions Completed</span>
                    <span class="stat-label">Muhammad Rayyan</span>
                </div>
            </div>
        </footer>
    </main>

    <script src="app.js"></script>
</body>
</html>
